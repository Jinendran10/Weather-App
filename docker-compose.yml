version: "3.9"

services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: weathervault_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: weather_user
      POSTGRES_PASSWORD: weather_pass
      POSTGRES_DB: weatherdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather_user -d weatherdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: weathervault_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://weather_user:weather_pass@db:5432/weatherdb
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - exports_volume:/app/exports
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: weathervault_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── pgAdmin (optional DB browser) ──────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: weathervault_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@weathervault.dev
      PGADMIN_DEFAULT_PASSWORD: pgadmin_pass
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - dev

volumes:
  postgres_data:
  exports_volume:
